# =============================================================================
# Telegraf Configuration: Cisco Telemetry -> Zerobus -> Databricks
# Workspace: e2-demo-field-eng.cloud.databricks.com
# Target:    danny_catalog.cisco_telemetry.*
# =============================================================================

[global_tags]
  collector = "telegraf"
  environment = "demo"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 500
  metric_buffer_limit = 100000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "5s"
  precision = "1ms"
  hostname = ""  # auto-detect
  omit_hostname = false


# =============================================================================
# INPUTS
# =============================================================================

# --- NetFlow from Cisco devices (v5) ---
[[inputs.netflow]]
  service_address = "udp://:2055"
  protocol = "netflow v5"
  read_buffer_size = "256KiB"
  [inputs.netflow.tags]
    telemetry_type = "netflow"

# --- Syslog (Event Logs) from Cisco devices ---
[[inputs.syslog]]
  server = "tcp://:6514"
  syslog_standard = "RFC5424"
  framing = "octet-counting"
  max_connections = 100
  read_timeout = "30s"
  best_effort = true
  [inputs.syslog.tags]
    telemetry_type = "syslog"

# --- SNMP Traps from Cisco devices ---
[[inputs.snmp_trap]]
  service_address = "udp://:162"
  version = "2c"
  path = ["/usr/share/snmp/mibs"]
  [inputs.snmp_trap.tags]
    telemetry_type = "snmp_trap"


# =============================================================================
# PROCESSORS
# =============================================================================

# Add ingestion timestamp to all metrics
[[processors.date]]
  field_key = "ingestion_time"
  date_format = "2006-01-02T15:04:05.000Z"
  timezone = "UTC"


# =============================================================================
# OUTPUTS — Single HTTP output to local Zerobus relay
# The relay handles routing by telemetry_type tag and uses the Zerobus SDK
# =============================================================================

# --- All telemetry -> Zerobus relay (localhost:9090) ---
[[outputs.http]]
  alias = "zerobus_relay"
  url = "http://127.0.0.1:9090"
  method = "POST"
  data_format = "json"
  use_batch_format = true
  timeout = "10s"
  [outputs.http.headers]
    Content-Type = "application/json"


# --- Debug: File output for troubleshooting (comment out in production) ---
[[outputs.file]]
  files = ["/tmp/telegraf_debug.json"]
  data_format = "json"
  rotation_max_size = "50MB"
  rotation_max_archives = 3
